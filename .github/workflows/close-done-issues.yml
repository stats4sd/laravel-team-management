name: Issue States

on:
  project_card:
    type: [created, edited, moved]

permissions:
  repository-projects: read
  issues: write
  pull-requests: write


jobs:
  action:
    runs-on: ubuntu-latest
    steps:
      - uses: dessant/issue-states@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          open-issue-columns: 'Backlog, Todo, In Progress, Review'
          closed-issue-columns: 'Done'
          log-output: false
